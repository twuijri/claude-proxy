version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
#  Claude Max Proxy – Stack للـ Portainer (يسحب الـ image من ghcr.io)
#
#  الاستخدام في Portainer:
#    Stacks → Add Stack → Web editor → الصق هذا الملف كامل
#
#  Environment Variables المطلوبة:
#    PROXY_API_KEY  ← مفتاحك الخاص (أي نص عشوائي)
#
#  بعد التشغيل – سجّل دخولك مرة وحدة:
#    docker exec -it claude-proxy claude
# ══════════════════════════════════════════════════════════════════════════════

services:

  claude-proxy:
    image: ghcr.io/twuijri/claude-proxy:latest
    container_name: claude-proxy
    restart: unless-stopped
    environment:
      PROXY_API_KEY: ${PROXY_API_KEY:-proxy-key-change-me}
      CLAUDE_ORG_ID: ${CLAUDE_ORG_ID:-}
      CLAUDE_SESSION_KEY: ${CLAUDE_SESSION_KEY:-}
      CLAUDE_CREDENTIALS_FILE: /home/claude/.claude/credentials.json
    volumes:
      - claude-credentials:/home/claude/.claude
    ports:
      - "${PROXY_PORT:-8080}:8080"

volumes:
  claude-credentials:
