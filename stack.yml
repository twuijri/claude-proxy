version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
#  Claude Max Proxy – Stack File
#  يستخدم الـ images الجاهزة من ghcr.io (لا يحتاج build محلي)
#
#  الاستخدام:
#    docker compose -f stack.yml up -d
#
#  أو في Portainer:
#    Stacks → Add Stack → Web editor → الصق المحتوى
#    أضف Environment Variables: PROXY_API_KEY, GITHUB_USERNAME
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Claude Auth – تسجيل الدخول عبر Claude CLI
  # بعد التشغيل: docker exec -it claude-auth claude
  # ──────────────────────────────────────────────────────────────────────────
  claude-auth:
    image: ghcr.io/${GITHUB_USERNAME}/claude-auth:latest
    container_name: claude-auth
    restart: unless-stopped
    volumes:
      - claude-credentials:/root/.claude
    networks:
      - proxy-net

  # ──────────────────────────────────────────────────────────────────────────
  # Claude Proxy – OpenAI-compatible API
  # ──────────────────────────────────────────────────────────────────────────
  claude-proxy:
    image: ghcr.io/${GITHUB_USERNAME}/claude-proxy:latest
    container_name: claude-proxy
    restart: unless-stopped
    depends_on:
      - claude-auth
    environment:
      PROXY_API_KEY: ${PROXY_API_KEY:-proxy-key-change-me}
      CLAUDE_ORG_ID: ${CLAUDE_ORG_ID:-}
      CLAUDE_SESSION_KEY: ${CLAUDE_SESSION_KEY:-}
      CLAUDE_CREDENTIALS_FILE: /root/.claude/credentials.json
    volumes:
      - claude-credentials:/root/.claude:ro
    ports:
      - "${PROXY_PORT:-8080}:8080"
    networks:
      - proxy-net

networks:
  proxy-net:
    driver: bridge

volumes:
  claude-credentials:
