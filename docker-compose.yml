version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
#  Claude Max Proxy – بناء محلي
#  docker compose up -d --build
#  ثم: docker exec -it claude-proxy claude   (لتسجيل الدخول مرة وحدة)
# ══════════════════════════════════════════════════════════════════════════════

services:

  claude-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-proxy
    restart: unless-stopped
    environment:
      PROXY_API_KEY: ${PROXY_API_KEY:-proxy-key-change-me}
      UI_PASSWORD: ${UI_PASSWORD:-admin}
      CLAUDE_ORG_ID: ${CLAUDE_ORG_ID:-}
      CLAUDE_SESSION_KEY: ${CLAUDE_SESSION_KEY:-}
      CLAUDE_CREDENTIALS_FILE: /home/claude/.claude/credentials.json
    volumes:
      - claude-credentials:/home/claude/.claude
    ports:
      - "${PROXY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  claude-credentials:
